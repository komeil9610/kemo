name = "tarkeeb-pro-frontend"
main = "cloudflare/worker.js"
compatibility_date = "2026-03-26"
workers_dev = false
preview_urls = false
routes = [
  { pattern = "kumeelalnahab.com", custom_domain = true },
  { pattern = "www.kumeelalnahab.com", custom_domain = true }
]

[assets]
binding = "ASSETS"
directory = "./build"
run_worker_first = true

[[services]]
binding = "EDGE_API"
service = "tarkeeb-pro-edge-api"

[vars]
API_ORIGIN = "https://api.kumeelalnahab.com"
EXCEL_UPLOAD_ORIGIN = "https://excel-upload.kumeelalnahab.com"
ADMIN_FRONTEND_ORIGIN = "https://kemo-eight.vercel.app"

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Build target
        required: true
        default: all
        type: choice
        options:
          - all
          - admin
          - technician
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-android-apk.yml'
      - 'apk/**'
      - 'frontend/**'

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.flavor }} APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - admin
          - technician
    env:
      JAVA_VERSION: '17'
      NODE_VERSION: '20'
      ANDROID_API_LEVEL: '35'
      ANDROID_BUILD_TOOLS: '35.0.0'
      CAPACITOR_SERVER_ORIGIN: https://tarkeeb-pro-frontend.bobkumeel.workers.dev

    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.flavor == 'all' || github.event.inputs.flavor == matrix.flavor }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apk/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager "platform-tools" "platforms;android-${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install APK dependencies
        working-directory: apk
        run: npm ci

      - name: Make Gradle wrapper executable
        run: chmod +x apk/android/gradlew

      - name: Build APK
        working-directory: apk
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: npm run build:apk:${{ matrix.flavor }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tarkeeb-pro-${{ matrix.flavor }}-apk
          path: apk/dist/*.apk
          if-no-files-found: error
          retention-days: 14
